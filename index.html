<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clon MercadoLibre</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav>
            <h1>MercadoLibre Clone</h1>
        </nav>
    </header>

    <!-- Buscador de productos -->
    <section id="product-search">
        <h2>Buscar productos</h2>
        <input type="text" placeholder="Buscar...">
        <button>Buscar</button>
    </section>

    <!-- Lista de productos -->
    <section id="product-list">
        <h2>Productos destacados</h2>

        <div class="products">

            <div class="product-card">
                <h3>Producto 1</h3>
                <p>$100</p>
            </div>

            <div class="product-card">
                <h3>Producto 2</h3>
                <p>$200</p>
            </div>

            <div class="product-card">
                <h3>Producto 3</h3>
                <p>$300</p>
            </div>

        </div>
    </section>

    <!-- Portafolio de desarrolladores -->
    <section id="dev-portfolio">
        <h2>Nuestro equipo</h2>

        <div class="developer">
            <h3>Nombre del desarrollador</h3>
            <p>Descripción profesional</p>
        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>Proyecto académico - Clon MercadoLibre</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
