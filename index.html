<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clon MercadoLibre</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav>
            <h1>MercadoLibre Clone</h1>
        </nav>
    </header>

    <!-- Buscador de productos -->
    <section id="product-search" class="search-section">
        <div class="search-container">
            <form id="search-form" class="search-form" role="search">
                <label for="search-input" class="search-label">Buscar productos</label>
                <div class="search-input-wrapper">
                    <input 
                        type="text" 
                        id="search-input" 
                        class="search-input" 
                        placeholder="Buscar productos, marcas y más..." 
                        aria-label="Buscar productos"
                        autocomplete="off"
                    >
                    <button type="submit" id="search-button" class="search-button" aria-label="Buscar">
                        <span class="search-icon">🔍</span>
                    </button>
                </div>
            </form>
            <div id="search-results-message" class="search-message" role="status" aria-live="polite"></div>
        </div>
    </section>

    <!-- Lista de productos -->
    <section id="product-list">
        <h2>Productos destacados</h2>

        <div class="products">

            <div class="product-card">
                <h3>Producto 1</h3>
                <p>$100</p>
            </div>

            <div class="product-card">
                <h3>Producto 2</h3>
                <p>$200</p>
            </div>

            <div class="product-card">
                <h3>Producto 3</h3>
                <p>$300</p>
            </div>

        </div>
    </section>

    <!-- Portafolio de desarrolladores -->
    <section id="dev-portfolio">
        <h2>Nuestro equipo</h2>

        <div class="developer">
            <h3>Nombre del desarrollador</h3>
            <p>Descripción profesional</p>
        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>Proyecto académico - Clon MercadoLibre</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
