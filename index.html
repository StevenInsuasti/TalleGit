<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clon MercadoLibre</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dev-portfolio-3.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav>
            <h1>MercadoLibre Clone</h1>
        </nav>
    </header>

    <!-- Buscador de productos -->
    <section id="product-search">
        <h2>Buscar productos</h2>
        <input type="text" placeholder="Buscar...">
        <button>Buscar</button>
    </section>

    <!-- Lista de productos -->
    <section id="product-list">
        <h2>Productos destacados</h2>

        <div class="products">

            <div class="product-card">
                <h3>Producto 1</h3>
                <p>$100</p>
            </div>

            <div class="product-card">
                <h3>Producto 2</h3>
                <p>$200</p>
            </div>

            <div class="product-card">
                <h3>Producto 3</h3>
                <p>$300</p>
            </div>

        </div>
    </section>

    <!-- Portafolio de desarrolladores -->
    <section id="dev-portfolio">
        <h2>Nuestro equipo</h2>

        <div class="developers-container">
            <!-- Aquí se agregarán los portafolios individuales de cada desarrollador -->
            
            <!-- Portafolio Desarrollador 3 -->
            <article class="developer-card" id="dev-3">
                <div class="dev-header">
                    <div class="dev-avatar">
                        <img src="https://via.placeholder.com/150" alt="Hector Alejandro Riascos Insuasty">
                    </div>
                    <div class="dev-basic-info">
                        <h3 class="dev-name"></h3>
                        <p class="dev-title"></p>
                        <p class="dev-level"></p>
                    </div>
                </div>
                
                <div class="dev-body">
                    <div class="dev-description">
                        <h4>Sobre mí</h4>
                        <p></p>
                    </div>
                    
                    <div class="dev-services">
                        <h4>Servicios</h4>
                        <ul></ul>
                    </div>
                    
                    <div class="dev-technologies">
                        <h4>Tecnologías</h4>
                        <ul class="tech-list"></ul>
                    </div>
                    
                    <div class="dev-contribution">
                        <h4>Aporte al proyecto</h4>
                        <p></p>
                    </div>
                </div>
                
                <div class="dev-footer">
                    <div class="dev-contact">
                        <p class="contact-phone"></p>
                    </div>
                    <a href="#" class="dev-github" target="_blank" rel="noopener noreferrer">
                        <span>GitHub</span>
                    </a>
                </div>
            </article>
            
        </div>

    </section></h3>

    <!-- Footer -->
    <footer>
        <p>Proyecto académico - Clon MercadoLibre</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
